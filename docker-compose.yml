version: "3.9"

# ── SARC360 ERP — Production Stack ───────────────────────────────────────────
# Services: api + nginx + redis
# PostgreSQL is hosted on Supabase (external) — not included here.
#
# To start:
#   cp .env.production .env
#   docker compose up -d
#
# To run migrations:
#   docker compose exec api alembic upgrade head

services:

  # ── FastAPI application ─────────────────────────────────────────────────────
  api:
    image: sarc360-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sarc360_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sarc360_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx reverse proxy + SSL termination ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sarc360_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro          # mount certs here
      - ./deploy/nginx/logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - sarc360_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis (Celery broker + rate-limit cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sarc360_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - sarc360_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  sarc360_net:
    driver: bridge

volumes:
  redis_data:
